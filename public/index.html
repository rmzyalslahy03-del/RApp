<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>💬 Ramz-App | المراسلة المتكاملة</title>
    <!-- FontAwesome مع احتياطي -->
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'" onerror="loadFallbackCDN()">
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"></noscript>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- SQLite WASM -->
    <script src="https://cdn.jsdelivr.net/npm/@sqlite.org/sqlite-wasm@3.46.0/sqlite-wasm.js"></script>
    <!-- Socket.io -->
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        :root {
            --bg: #0d0d0d; --surface: #1a1a1a; --surface2: #222; --surface3: #2a2a2a;
            --text: #fff; --text2: #ddd; --text3: #999; --border: #2c2c2c;
            --accent: #ff0050; --accent2: #ff6b8a; --green: #00a884; --blue-check: #4fc3f7;
            --shadow: 0 8px 32px rgba(0,0,0,0.6); --radius: 20px; --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
        }
        .light-theme { --bg: #f0f2f5; --surface: #fff; --surface2: #f5f5f5; --surface3: #e9edef; --text: #111; --text2: #333; --text3: #667781; --border: #e0e0e0; --shadow: 0 4px 20px rgba(0,0,0,0.08); }
        body { background: var(--bg); font-family: 'Cairo', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; color: var(--text); transition: background var(--transition); }
        /* شاشة تسجيل الدخول */
        .login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; gap: 20px; transition: opacity 0.5s; }
        .login-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .login-logo { font-size: 58px; font-weight: 900; background: linear-gradient(135deg, #ff0050, #ff6b8a); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .login-input { width: 300px; padding: 15px 20px; border-radius: 30px; border: 2px solid var(--border); background: var(--surface2); color: var(--text); text-align: center; outline: none; }
        .login-btn { width: 300px; padding: 15px; border-radius: 30px; border: none; background: linear-gradient(135deg, #ff0050, #ff6b8a); color: #fff; font-weight: bold; cursor: pointer; }
        .guest-btn { background: transparent; border: 2px solid var(--accent); color: var(--accent); }
        /* التطبيق */
        .app-container { display: flex; flex-direction: column; height: 100%; position: relative; }
        .screen { display: none; flex-direction: column; flex: 1; overflow-y: auto; position: absolute; inset: 0; bottom: 70px; background: var(--bg); z-index: 1; }
        .screen.active { display: flex; z-index: 2; }
        .screen.no-nav { bottom: 0; }
        .app-header { background: var(--surface); padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); min-height: 56px; position: sticky; top: 0; z-index: 20; }
        .header-btn { background: none; border: none; color: var(--text); font-size: 20px; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; }
        .chat-header-bar { background: var(--surface); padding: 8px 12px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); }
        .chat-avatar { width: 42px; height: 42px; border-radius: 50%; background: var(--surface3); display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .chat-header-info { flex: 1; cursor: pointer; }
        .chat-header-name { font-weight: bold; }
        .chat-header-status { font-size: 11px; color: var(--text3); }
        .chat-header-status.online { color: var(--green); }
        .chat-header-status.typing { color: var(--green); animation: pulse 1.2s infinite; }
        .messages-area { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 6px; background: var(--bg); }
        .msg-row { display: flex; width: 100%; }
        .msg-row.own { justify-content: flex-end; }
        .msg-bubble { max-width: 84%; padding: 8px 12px; border-radius: 16px; font-size: 13.5px; line-height: 1.5; position: relative; word-break: break-word; }
        .own .msg-bubble { background: #005c4b; color: #e9ffef; border-bottom-left-radius: 4px; }
        .other .msg-bubble { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); border-bottom-right-radius: 4px; }
        .msg-time-row { display: flex; justify-content: flex-end; align-items: center; gap: 4px; margin-top: 2px; font-size: 10px; color: var(--text3); }
        .attachment-img { max-width: 200px; max-height: 150px; border-radius: 10px; margin-top: 4px; cursor: pointer; }
        .file-link { display: inline-block; background: #e0e0e0; padding: 5px 10px; border-radius: 15px; text-decoration: none; color: #075e54; font-size: 12px; }
        .progress-container { width: 100%; background: rgba(0,0,0,0.2); border-radius: 20px; margin-top: 6px; height: 4px; overflow: hidden; }
        .file-progress { width: 0%; height: 4px; background: var(--green); transition: width 0.2s; }
        .input-bar { background: var(--surface); padding: 8px 10px; display: flex; align-items: center; gap: 6px; border-top: 1px solid var(--border); }
        .input-bar input { flex: 1; background: var(--surface3); border: none; border-radius: 25px; padding: 10px 16px; color: var(--text); outline: none; }
        .input-btn { background: none; border: none; color: var(--text3); font-size: 20px; width: 38px; height: 38px; border-radius: 50%; cursor: pointer; }
        .send-btn, .mic-btn { background: var(--accent) !important; color: #fff !important; border-radius: 50% !important; }
        .mic-btn.recording { background: #ff0000 !important; animation: pulseRec 0.8s infinite; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); display: flex; justify-content: space-around; padding: 6px 0 10px; border-top: 1px solid var(--border); z-index: 100; }
        .nav-item { background: none; border: none; color: var(--text3); display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; font-size: 10px; min-width: 55px; }
        .nav-item.active { color: var(--accent); }
        .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 20px; border-radius: 25px; font-size: 13px; z-index: 5000; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        .toast.show { opacity: 1; }
        .modal-overlay, .popup-overlay, .image-viewer, .story-viewer, .call-screen-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(6px); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .modal-card, .popup-menu { background: var(--surface); border-radius: 24px; width: 320px; max-width: 90%; overflow: hidden; text-align: center; }
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text3); }
        @keyframes pulseRec { 0%,100% { box-shadow: 0 0 0 0 rgba(255,0,0,0.5); } 50% { box-shadow: 0 0 0 15px rgba(255,0,0,0); } }
        @keyframes pulse { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="login-screen" id="loginScreen">
        <div class="login-logo">💬 Ramz-App</div>
        <div class="login-subtitle">تطبيق المراسلة المتكامل</div>
        <input type="text" class="login-input" id="loginNameInput" placeholder="اسم المستخدم" autocomplete="off">
        <input type="password" class="login-input" id="loginPasswordInput" placeholder="كلمة المرور">
        <button class="login-btn" id="loginBtn">دخول</button>
        <button class="login-btn guest-btn" id="guestBtn">دخول كضيف</button>
    </div>

    <div class="app-container" id="appContainer" style="display:none;">
        <!-- شاشة الدردشات -->
        <div class="screen active" id="chatsScreen">
            <div class="app-header">
                <button class="header-btn" id="settingsBtn"><i class="fas fa-cog"></i></button>
                <h2>💬 Ramz-App</h2>
                <button class="header-btn" id="mainMenuBtn"><i class="fas fa-ellipsis-v"></i></button>
            </div>
            <div class="search-bar"><input type="text" id="searchChatsInput" placeholder="بحث في المحادثات..."></div>
            <div class="chats-list" id="chatsList"></div>
        </div>

        <!-- شاشة المحادثة -->
        <div class="screen no-nav" id="chatScreen">
            <div class="chat-header-bar">
                <button class="header-btn" id="backBtn"><i class="fas fa-arrow-right"></i></button>
                <div class="chat-avatar" id="chatAvatar">م</div>
                <div class="chat-header-info" id="chatHeaderInfo">
                    <div class="chat-header-name" id="chatNameDisp"></div>
                    <div class="chat-header-status" id="chatStatusDisp"></div>
                </div>
                <button class="header-btn" id="chatMenuBtn"><i class="fas fa-ellipsis-v"></i></button>
            </div>
            <div class="messages-area" id="messagesArea"></div>
            <div class="input-bar">
                <button class="input-btn" id="emojiBtn"><i class="far fa-smile-wink"></i></button>
                <button class="input-btn" id="attachBtn"><i class="fas fa-paperclip"></i></button>
                <input type="text" id="msgInput" placeholder="اكتب رسالة...">
                <button class="input-btn send-btn" id="sendMsgBtn" style="display:none;"><i class="fas fa-paper-plane"></i></button>
                <button class="input-btn mic-btn" id="micBtn"><i class="fas fa-microphone"></i></button>
            </div>
        </div>

        <!-- شاشات أخرى مختصرة -->
        <div class="screen" id="settingsScreen"><div class="app-header"><button class="header-btn" id="closeSettingsBtn"><i class="fas fa-arrow-right"></i></button><h2>الإعدادات</h2></div><div class="settings-list"></div></div>
    </div>

    <!-- نافذة منبثقة للمستخدم -->
    <div class="modal-overlay" id="userModal"><div class="modal-card"><div class="modal-avatar"></div><div class="modal-name"></div><div class="modal-actions"><button class="modal-action" id="modalChatBtn">محادثة</button><button class="modal-action" id="modalCallBtn">اتصال</button></div></div></div>
    <div class="toast" id="toast"></div>
    <div class="image-viewer" id="imageViewer"><button class="image-viewer-close" id="closeImageViewer">&times;</button><img src="" id="viewerImage"></div>

    <script>
        // ==================== 1. المتغيرات العامة والتهيئة ====================
        let currentUser = null;
        let currentChatId = null;
        let socket = null;
        let sqlite3 = null;
        let localDB = null;
        let opfsRoot = null;
        let replyTarget = null;
        let typingTimeout = null;
        let activeUploads = new Map();

        // أسماء الملفات والمجلدات
        const LOCAL_DB_NAME = 'chat_messagesramz.db';
        const MEDIA_PATH = 'media/RamzApp';

        // دوال OPFS
        async function initOPFS() {
            if (!navigator.storage.getDirectory) throw new Error('OPFS not supported');
            opfsRoot = await navigator.storage.getDirectory();
            const mediaDir = await opfsRoot.getDirectoryHandle('media', { create: true });
            await mediaDir.getDirectoryHandle('RamzApp', { create: true });
        }

        async function saveFileToOPFS(fileBlob, fileId) {
            const mediaDir = await opfsRoot.getDirectoryHandle('media', { create: true });
            const ramzDir = await mediaDir.getDirectoryHandle('RamzApp', { create: true });
            const fileHandle = await ramzDir.getFileHandle(fileId, { create: true });
            const writable = await fileHandle.createWritable();
            await writable.write(fileBlob);
            await writable.close();
        }

        async function getFileFromOPFS(fileId) {
            const mediaDir = await opfsRoot.getDirectoryHandle('media', { create: false });
            const ramzDir = await mediaDir.getDirectoryHandle('RamzApp', { create: false });
            const fileHandle = await ramzDir.getFileHandle(fileId);
            return await fileHandle.getFile();
        }

        // SQLite المحلية
        async function initLocalSQLite() {
            if (!window.sqlite3InitModule) throw new Error('SQLite not loaded');
            sqlite3 = await window.sqlite3InitModule({ print: console.log });
            localDB = new sqlite3.oo1.OpfsDb('/' + LOCAL_DB_NAME);
            localDB.exec(`
                CREATE TABLE IF NOT EXISTS messages (
                    id INTEGER PRIMARY KEY AUTOINCREMENT,
                    messageId TEXT UNIQUE,
                    sender TEXT NOT NULL,
                    receiver TEXT NOT NULL,
                    type TEXT NOT NULL,
                    content TEXT,
                    fileId TEXT,
                    fileType TEXT,
                    fileSize INTEGER,
                    time INTEGER NOT NULL,
                    status TEXT DEFAULT 'sending'
                );
            `);
        }

        async function saveTextMessageLocally(messageId, sender, receiver, text, time, status = 'sending') {
            localDB.exec(`INSERT INTO messages (messageId, sender, receiver, type, content, time, status) VALUES (?, ?, ?, 'text', ?, ?, ?)`,
                [messageId, sender, receiver, text, time, status]);
        }
        async function saveFileMessageLocally(messageId, sender, receiver, fileName, fileId, mimeType, fileSize, time, status = 'sending') {
            localDB.exec(`INSERT INTO messages (messageId, sender, receiver, type, content, fileId, fileType, fileSize, time, status) VALUES (?, ?, ?, 'file', ?, ?, ?, ?, ?, ?)`,
                [messageId, sender, receiver, fileName, fileId, mimeType, fileSize, time, status]);
        }
        async function updateMessageStatus(messageId, status) {
            localDB.exec(`UPDATE messages SET status = ? WHERE messageId = ?`, [status, messageId]);
        }
        async function getAllMessagesForChat(chatId) {
            const result = localDB.exec(`SELECT * FROM messages WHERE (sender = ? AND receiver = ?) OR (sender = ? AND receiver = ?) ORDER BY time ASC`,
                [currentUser, chatId, chatId, currentUser], { rowMode: 'object' });
            return result;
        }

        // عرض الرسائل
        async function renderMessages() {
            if (!currentChatId) return;
            const msgs = await getAllMessagesForChat(currentChatId);
            const area = document.getElementById('messagesArea');
            area.innerHTML = '';
            let lastDate = '';
            for (const m of msgs) {
                const dateStr = new Date(m.time).toDateString();
                if (dateStr !== lastDate) {
                    area.innerHTML += `<div class="date-divider">${new Date(m.time).toLocaleDateString('ar-SA')}</div>`;
                    lastDate = dateStr;
                }
                const isMe = m.sender === currentUser;
                let statusHtml = '';
                if (isMe) {
                    if (m.status === 'sending') statusHtml = '<span class="msg-status">⏳</span>';
                    else if (m.status === 'delivered') statusHtml = '<span class="msg-status"><i class="fas fa-check-double"></i></span>';
                    else if (m.status === 'read') statusHtml = '<span class="msg-status"><i class="fas fa-check-double" style="color:var(--blue-check);"></i></span>';
                    else statusHtml = '<span class="msg-status">❌</span>';
                }
                let contentHtml = '';
                if (m.type === 'text') {
                    contentHtml = `<div class="msg-text">${escapeHtml(m.content)}</div>`;
                } else {
                    try {
                        const file = await getFileFromOPFS(m.fileId);
                        const url = URL.createObjectURL(file);
                        if (m.fileType.startsWith('image/')) {
                            contentHtml = `<img src="${url}" class="attachment-img" onclick="window.open('${url}')">`;
                        } else if (m.fileType.startsWith('video/')) {
                            contentHtml = `<video controls src="${url}" style="max-width:200px; border-radius:10px;"></video>`;
                        } else {
                            contentHtml = `<a href="${url}" download="${escapeHtml(m.content)}" class="file-link">📎 ${escapeHtml(m.content)} (${formatFileSize(m.fileSize)})</a>`;
                        }
                        setTimeout(() => URL.revokeObjectURL(url), 60000);
                    } catch(e) { contentHtml = `<span style="color:red;">⚠️ ملف غير متوفر</span>`; }
                }
                area.innerHTML += `
                    <div class="msg-row ${isMe ? 'own' : 'other'}">
                        <div class="msg-bubble">
                            ${contentHtml}
                            <div class="msg-time-row">
                                <span>${new Date(m.time).toLocaleTimeString('ar-SA', {hour:'2-digit', minute:'2-digit'})}</span>
                                ${statusHtml}
                            </div>
                        </div>
                    </div>
                `;
            }
            area.scrollTop = area.scrollHeight;
        }

        function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
        function formatFileSize(bytes) { if(bytes<1024) return bytes+' B'; if(bytes<1048576) return (bytes/1024).toFixed(1)+' KB'; return (bytes/1048576).toFixed(1)+' MB'; }

        // إرسال الرسائل
        async function sendTextMessage(receiver, text) {
            const messageId = Date.now() + '_' + Math.random().toString(36).substr(2, 6);
            const time = Date.now();
            await saveTextMessageLocally(messageId, currentUser, receiver, text, time, 'sending');
            renderMessages();
            socket.emit('send_message', { sender: currentUser, receiver, messageId, content: text, time });
        }

        async function sendFileMessage(receiver, file) {
            const messageId = Date.now() + '_' + Math.random().toString(36).substr(2, 6);
            const fileId = `${messageId}_${file.name}`;
            const time = Date.now();
            await saveFileToOPFS(file, fileId);
            await saveFileMessageLocally(messageId, currentUser, receiver, file.name, fileId, file.type, file.size, time, 'sending');
            renderMessages();
            const reader = new FileReader();
            reader.onload = (e) => {
                const arrayBuffer = e.target.result;
                socket.emit('send_file', { sender: currentUser, receiver, messageId, fileName: file.name, fileId, fileType: file.type, fileSize: file.size, time, data: arrayBuffer });
            };
            reader.readAsArrayBuffer(file);
        }

        // Socket.io
        function initSocket() {
            socket = io();
            socket.emit('user_online', currentUser);
            socket.on('receive_message', async (data) => {
                if (data.sender !== currentUser && data.receiver === currentUser) {
                    await saveTextMessageLocally(data.messageId, data.sender, data.receiver, data.content, data.time, 'delivered');
                    renderMessages();
                    socket.emit('read_receipt', { sender: data.sender, receiver: currentUser, messageId: data.messageId });
                }
            });
            socket.on('receive_file', async (data) => {
                if (data.sender !== currentUser && data.receiver === currentUser) {
                    const blob = new Blob([new Uint8Array(data.data)], { type: data.fileType });
                    await saveFileToOPFS(blob, data.fileId);
                    await saveFileMessageLocally(data.messageId, data.sender, data.receiver, data.fileName, data.fileId, data.fileType, data.fileSize, data.time, 'delivered');
                    renderMessages();
                    socket.emit('read_receipt', { sender: data.sender, receiver: currentUser, messageId: data.messageId });
                }
            });
            socket.on('message_delivered', ({ messageId }) => { updateMessageStatus(messageId, 'delivered'); renderMessages(); });
            socket.on('message_read', ({ messageId }) => { updateMessageStatus(messageId, 'read'); renderMessages(); });
            socket.on('typing', ({ sender, isTyping }) => {
                if (sender !== currentUser && currentChatId === sender) {
                    const statusDiv = document.getElementById('chatStatusDisp');
                    if (isTyping) { statusDiv.textContent = 'يكتب الآن...'; statusDiv.classList.add('typing'); }
                    else { statusDiv.textContent = 'متصل الآن'; statusDiv.classList.remove('typing'); }
                }
            });
        }

        // مؤشر الكتابة
        function onTypingStart() {
            if (!currentChatId) return;
            socket.emit('typing', { sender: currentUser, receiver: currentChatId, isTyping: true });
            if (typingTimeout) clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => socket.emit('typing', { sender: currentUser, receiver: currentChatId, isTyping: false }), 1500);
        }

        // تسجيل الدخول والخروج
        async function onLoginSuccess(username) {
            currentUser = username;
            localStorage.setItem('ramz_current_user', username);
            await initOPFS();
            await initLocalSQLite();
            initSocket();
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('appContainer').style.display = 'flex';
            showScreen('chats');
            toast(`مرحباً ${username}`);
        }
        function logout() { if(socket) socket.disconnect(); localStorage.removeItem('ramz_current_user'); location.reload(); }
        function toast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }
        function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id + 'Screen').classList.add('active'); }

        // محادثات وهمية (قائمة المستخدمين)
        let chats = [
            { id: 'رمزي', name: 'رمزي', avatar: 'ر', online: true, lastMsg: '', lastTime: null },
            { id: 'شعلان', name: 'شعلان', avatar: 'ش', online: true, lastMsg: '', lastTime: null }
        ];
        function renderChats() {
            const container = document.getElementById('chatsList');
            container.innerHTML = chats.map(c => `
                <div class="chat-item" data-id="${c.id}">
                    <div class="chat-avatar">${c.avatar}<span class="online-dot"></span></div>
                    <div class="chat-info"><div class="chat-name">${c.name}</div><div class="chat-preview"><span class="last-msg">${c.lastMsg || 'اضغط للدردشة'}</span></div></div>
                </div>
            `).join('');
            document.querySelectorAll('.chat-item').forEach(el => el.addEventListener('click', () => openChat(el.dataset.id)));
        }
        async function openChat(chatId) {
            currentChatId = chatId;
            const chat = chats.find(c => c.id === chatId);
            document.getElementById('chatNameDisp').textContent = chat.name;
            document.getElementById('chatAvatar').textContent = chat.avatar;
            document.getElementById('chatStatusDisp').textContent = chat.online ? 'متصل الآن' : 'غير متصل';
            await renderMessages();
            showScreen('chat');
        }

        // أحداث الواجهة
        document.getElementById('loginBtn').onclick = async () => {
            const username = document.getElementById('loginNameInput').value.trim();
            const password = document.getElementById('loginPasswordInput').value;
            if(!username || !password) return toast('أدخل اسم المستخدم وكلمة المرور');
            try {
                const res = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
                const data = await res.json();
                if(!res.ok) throw new Error(data.error);
                onLoginSuccess(username);
            } catch(e) { toast(e.message); }
        };
        document.getElementById('guestBtn').onclick = () => toast('استخدم حساب رمزي أو شعلان');
        document.getElementById('sendMsgBtn').onclick = () => {
            const input = document.getElementById('msgInput');
            if(input.value.trim() && currentChatId) { sendTextMessage(currentChatId, input.value); input.value = ''; }
        };
        document.getElementById('msgInput').addEventListener('input', onTypingStart);
        document.getElementById('msgInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') document.getElementById('sendMsgBtn').click(); });
        document.getElementById('backBtn').onclick = () => showScreen('chats');
        document.getElementById('attachBtn').onclick = () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.onchange = async (e) => { if(e.target.files[0] && currentChatId) await sendFileMessage(currentChatId, e.target.files[0]); };
            input.click();
        };
        document.getElementById('micBtn').onclick = () => toast('تسجيل الصوت قريباً');
        document.getElementById('settingsBtn').onclick = () => showScreen('settings');
        document.getElementById('closeSettingsBtn').onclick = () => showScreen('chats');
        document.getElementById('mainMenuBtn').onclick = () => toast('قائمة إضافية');
        document.getElementById('chatMenuBtn').onclick = () => toast('خيارات المحادثة');

        // بدء التشغيل
        (async () => {
            const saved = localStorage.getItem('ramz_current_user');
            if(saved) onLoginSuccess(saved);
            else { document.getElementById('loginScreen').classList.remove('hidden'); document.getElementById('appContainer').style.display = 'none'; }
            renderChats();
        })();
    </script>
</body>
</html>
