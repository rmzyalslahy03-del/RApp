<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>📱 Ramz‑App | مثل واتساب</title>
    <script>
        window.loadFallbackCDN = function() {
            if (window._fallbackLoaded) return;
            window._fallbackLoaded = true;
            const link = document.createElement('link');
            link.rel = 'stylesheet';
            link.href = 'https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.0.0/css/all.min.css';
            document.head.appendChild(link);
        };
        window.onFontAwesomeLoad = function() { console.log('FontAwesome loaded'); };
    </script>
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" as="style" 
          onload="this.onload=null;this.rel='stylesheet';window.onFontAwesomeLoad()" 
          onerror="window.loadFallbackCDN()">
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"></noscript>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@sqlite.org/sqlite-wasm@3.46.0/sqlite-wasm.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        :root {
            --bg: #0d0d0d; --surface: #1a1a1a; --surface2: #222; --surface3: #2a2a2a;
            --text: #fff; --text2: #ddd; --text3: #999; --border: #2c2c2c;
            --accent: #ff0050; --green: #00a884; --blue-check: #4fc3f7;
            --shadow: 0 8px 32px rgba(0,0,0,0.6);
        }
        .light-theme { --bg: #f0f2f5; --surface: #fff; --surface2: #f5f5f5; --surface3: #e9edef; --text: #111; --text2: #333; --text3: #667781; --border: #e0e0e0; --shadow: 0 4px 12px rgba(0,0,0,0.08); }
        body { background: var(--bg); font-family: 'Cairo', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; color: var(--text); transition: background 0.2s; }
        .login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; gap: 20px; transition: opacity 0.5s; }
        .login-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .login-logo { font-size: 58px; font-weight: 900; background: linear-gradient(135deg, #ff0050, #ff6b8a); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .login-input { width: 300px; padding: 15px 20px; border-radius: 30px; border: 2px solid var(--border); background: var(--surface2); color: var(--text); text-align: center; outline: none; font-family: inherit; font-size: 16px; }
        .login-btn { width: 300px; padding: 15px; border-radius: 30px; border: none; background: linear-gradient(135deg, #ff0050, #ff6b8a); color: #fff; font-weight: bold; cursor: pointer; font-family: inherit; font-size: 16px; margin-top: 10px; transition: opacity 0.2s; }
        .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .guest-btn { background: transparent; border: 2px solid var(--accent); color: var(--accent); }
        #loginLoader { display: none; margin-top: 10px; text-align: center; font-size: 14px; color: var(--accent); }
        #loginLoader i { margin-left: 8px; }
        .app-container { display: flex; flex-direction: column; height: 100%; position: relative; }
        .screen { display: none; flex-direction: column; flex: 1; overflow-y: auto; position: absolute; inset: 0; bottom: 70px; background: var(--bg); z-index: 1; }
        .screen.active { display: flex; z-index: 2; }
        .screen.no-nav { bottom: 0; }
        .app-header { background: var(--surface); padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); min-height: 56px; position: sticky; top: 0; z-index: 20; }
        .header-btn { background: none; border: none; color: var(--text); font-size: 20px; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .chat-header-bar { background: var(--surface); padding: 8px 12px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); }
        .chat-avatar { width: 42px; height: 42px; border-radius: 50%; background: var(--surface3); display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; position: relative; }
        .online-dot { position: absolute; bottom: 2px; right: 2px; width: 12px; height: 12px; background: var(--green); border-radius: 50%; border: 2px solid var(--surface); }
        .chat-header-info { flex: 1; cursor: pointer; }
        .chat-header-name { font-weight: bold; font-size: 16px; }
        .chat-header-status { font-size: 12px; color: var(--text3); }
        .chat-header-status.online { color: var(--green); }
        .chat-header-status.typing { color: var(--green); animation: pulse 1.2s infinite; }
        .messages-area { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; background: var(--bg); }
        .msg-row { display: flex; width: 100%; animation: fadeIn 0.2s ease; }
        .msg-row.own { justify-content: flex-end; }
        .msg-bubble { max-width: 80%; padding: 8px 12px; border-radius: 18px; font-size: 14px; line-height: 1.4; word-break: break-word; }
        .own .msg-bubble { background: #005c4b; color: #e9ffef; border-bottom-right-radius: 4px; }
        .other .msg-bubble { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
        .msg-time-row { display: flex; justify-content: flex-end; align-items: center; gap: 4px; margin-top: 4px; font-size: 10px; color: var(--text3); }
        .attachment-img { max-width: 200px; max-height: 150px; border-radius: 10px; margin-top: 6px; cursor: pointer; transition: transform 0.1s; }
        .attachment-img:hover { transform: scale(1.02); }
        .file-link { display: inline-flex; align-items: center; gap: 5px; background: rgba(0,0,0,0.1); padding: 6px 10px; border-radius: 20px; text-decoration: none; color: var(--accent); font-size: 12px; margin-top: 4px; }
        .date-divider { text-align: center; margin: 8px 0; font-size: 11px; color: var(--text3); background: var(--surface2); display: inline-block; padding: 4px 12px; border-radius: 12px; align-self: center; }
        .input-bar { background: var(--surface); padding: 8px 12px; display: flex; align-items: center; gap: 8px; border-top: 1px solid var(--border); }
        .input-bar input { flex: 1; background: var(--surface3); border: none; border-radius: 25px; padding: 10px 16px; color: var(--text); font-family: inherit; font-size: 14px; outline: none; }
        .input-bar input:focus { outline: 1px solid var(--accent); }
        .input-btn { background: none; border: none; color: var(--text3); font-size: 22px; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .send-btn, .mic-btn { background: var(--accent) !important; color: #fff !important; }
        .mic-btn.recording { background: #ff0000 !important; animation: pulseRec 0.8s infinite; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); display: flex; justify-content: space-around; padding: 6px 0 12px; border-top: 1px solid var(--border); z-index: 100; }
        .nav-item { background: none; border: none; color: var(--text3); display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; font-size: 11px; min-width: 65px; font-family: inherit; }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 22px; }
        .chats-list, .contacts-list, .calls-list, .updates-list { flex: 1; overflow-y: auto; }
        .chat-item, .contact-item, .call-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; cursor: pointer; border-bottom: 1px solid var(--border); transition: background 0.1s; }
        .chat-item:hover, .contact-item:hover, .call-item:hover { background: var(--surface2); }
        .chat-info, .contact-info, .call-info { flex: 1; min-width: 0; }
        .chat-name, .contact-name, .call-name { font-weight: bold; font-size: 15px; }
        .chat-preview, .contact-number, .call-time { display: flex; justify-content: space-between; align-items: center; margin-top: 4px; }
        .last-msg, .contact-number span, .call-time span { font-size: 13px; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
        .story-bar { padding: 12px 14px; border-bottom: 1px solid var(--border); overflow-x: auto; white-space: nowrap; display: flex; gap: 12px; background: var(--surface); }
        .story-item { display: inline-flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; min-width: 70px; }
        .story-ring { width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, #ff0050, #ff7b00); display: flex; align-items: center; justify-content: center; padding: 3px; }
        .story-avatar { width: 52px; height: 52px; border-radius: 50%; background: var(--surface3); display: flex; align-items: center; justify-content: center; font-weight: bold; border: 2px solid var(--bg); color: var(--text); }
        .story-name { font-size: 11px; color: var(--text3); max-width: 70px; overflow: hidden; text-overflow: ellipsis; }
        .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 20px; border-radius: 30px; font-size: 13px; z-index: 5000; opacity: 0; transition: opacity 0.3s; pointer-events: none; font-family: inherit; white-space: nowrap; }
        .toast.show { opacity: 1; }
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text3); }
        .modal-overlay, .image-viewer { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .modal-card { background: var(--surface); border-radius: 24px; width: 280px; max-width: 90%; text-align: center; padding: 20px; }
        .image-viewer { z-index: 3000; cursor: zoom-out; }
        .image-viewer.active { display: flex; }
        .image-viewer img { max-width: 95vw; max-height: 90vh; border-radius: 8px; }
        .image-viewer-close { position: absolute; top: 20px; left: 20px; background: rgba(255,255,255,0.2); border: none; color: #fff; font-size: 24px; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; }
        .search-bar { padding: 8px 14px; background: var(--surface); border-bottom: 1px solid var(--border); }
        .search-bar input { width: 100%; padding: 8px 16px; border-radius: 30px; border: none; background: var(--surface3); color: var(--text); font-family: inherit; outline: none; }
        @keyframes pulseRec { 0%,100% { box-shadow: 0 0 0 0 rgba(255,0,0,0.5); } 50% { box-shadow: 0 0 0 15px rgba(255,0,0,0); } }
        @keyframes pulse { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="login-screen" id="loginScreen">
        <div class="login-logo">💬 Ramz-App</div>
        <div class="login-subtitle">تطبيق مراسلة كامل</div>
        <input type="text" class="login-input" id="loginNameInput" placeholder="اسم المستخدم" autocomplete="off">
        <input type="password" class="login-input" id="loginPasswordInput" placeholder="كلمة المرور">
        <button class="login-btn" id="loginBtn">دخول</button>
        <div id="loginLoader"><i class="fas fa-spinner fa-pulse"></i> جاري تسجيل الدخول...</div>
        <button class="login-btn guest-btn" id="guestBtn">دخول كضيف</button>
    </div>

    <div class="app-container" id="appContainer" style="display:none;">
        <!-- شاشة الدردشات -->
        <div class="screen active" id="chatsScreen">
            <div class="app-header">
                <h2>Ramz‑App</h2>
                <div style="display: flex; gap: 4px;">
                    <button class="header-btn" id="newChatBtn"><i class="fas fa-edit"></i></button>
                    <button class="header-btn" id="globalSearchBtn"><i class="fas fa-search"></i></button>
                </div>
            </div>
            <div class="search-bar"><input type="text" id="searchChatsInput" placeholder="بحث في المحادثات..."></div>
            <div class="chats-list" id="chatsList"></div>
        </div>

        <!-- شاشة المحادثة الفردية -->
        <div class="screen no-nav" id="chatScreen">
            <div class="chat-header-bar">
                <button class="header-btn" id="backBtn"><i class="fas fa-arrow-right"></i></button>
                <div class="chat-avatar" id="chatAvatar">م</div>
                <div class="chat-header-info" id="chatHeaderInfo">
                    <div class="chat-header-name" id="chatNameDisp"></div>
                    <div class="chat-header-status" id="chatStatusDisp"></div>
                </div>
                <button class="header-btn" id="chatMenuBtn"><i class="fas fa-ellipsis-v"></i></button>
            </div>
            <div class="messages-area" id="messagesArea"></div>
            <div class="input-bar">
                <button class="input-btn" id="emojiBtn"><i class="far fa-smile-wink"></i></button>
                <button class="input-btn" id="attachBtn"><i class="fas fa-paperclip"></i></button>
                <input type="text" id="msgInput" placeholder="اكتب رسالة...">
                <button class="input-btn send-btn" id="sendMsgBtn" style="display:none;"><i class="fas fa-paper-plane"></i></button>
                <button class="input-btn mic-btn" id="micBtn"><i class="fas fa-microphone"></i></button>
            </div>
            <div class="emoji-picker" id="emojiPicker" style="display:none; position:absolute; bottom:70px; left:10px; background:var(--surface); border-radius:16px; padding:8px; width:280px; max-height:200px; overflow-y:auto; z-index:1000; flex-wrap:wrap; gap:4px;"></div>
        </div>

        <!-- شاشة التحديثات (القصص) -->
        <div class="screen" id="updatesScreen">
            <div class="app-header"><h2>التحديثات</h2><button class="header-btn" id="addStoryBtn"><i class="fas fa-plus-circle"></i></button></div>
            <div class="story-bar" id="storyBar"></div>
            <div class="updates-list" id="updatesList"></div>
        </div>

        <!-- شاشة المكالمات -->
        <div class="screen" id="callsScreen">
            <div class="app-header"><h2>المكالمات</h2><button class="header-btn" id="newCallBtn"><i class="fas fa-phone-plus"></i></button></div>
            <div class="calls-list" id="callsList"></div>
        </div>

        <!-- شاشة جهات الاتصال -->
        <div class="screen" id="contactsScreen">
            <div class="app-header"><h2>جهات الاتصال</h2><button class="header-btn" id="addContactBtn"><i class="fas fa-user-plus"></i></button></div>
            <div class="search-bar"><input type="text" id="searchContactsInput" placeholder="بحث..."></div>
            <div class="contacts-list" id="contactsList"></div>
        </div>

        <!-- شاشة الإعدادات -->
        <div class="screen" id="settingsScreen">
            <div class="app-header"><h2>الإعدادات</h2></div>
            <div style="padding:20px;">
                <button class="login-btn" id="themeToggleBtn" style="margin-bottom:15px;">🌙 الوضع الليلي / النهاري</button>
                <button class="login-btn" id="logoutBtn" style="background:#dc3545;">تسجيل الخروج</button>
                <p style="margin-top:20px; color:var(--text3); text-align:center;">Ramz-App v3.0 | مثل واتساب</p>
            </div>
        </div>
    </div>

    <!-- نوافذ منبثقة -->
    <div class="modal-overlay" id="userModal"><div class="modal-card"><div class="modal-avatar" id="modalAvatar" style="font-size:40px;">👤</div><div class="modal-name" id="modalName"></div><button class="login-btn" id="modalChatBtn">محادثة</button></div></div>
    <div class="toast" id="toast"></div>
    <div class="image-viewer" id="imageViewer"><button class="image-viewer-close" id="closeImageViewer">&times;</button><img src="" id="viewerImage"></div>

    <!-- الشريط السفلي -->
    <div class="bottom-nav" id="bottomNav">
        <button class="nav-item active" data-nav="chats"><i class="fas fa-comment-dots"></i><span>الدردشات</span></button>
        <button class="nav-item" data-nav="updates"><i class="fas fa-sync-alt"></i><span>التحديثات</span></button>
        <button class="nav-item" data-nav="calls"><i class="fas fa-phone"></i><span>المكالمات</span></button>
        <button class="nav-item" data-nav="contacts"><i class="fas fa-address-book"></i><span>جهات الاتصال</span></button>
        <button class="nav-item" data-nav="settings"><i class="fas fa-cog"></i><span>الإعدادات</span></button>
    </div>

    <script>
        (function(){
            // ========== متغيرات عامة ==========
            window.currentUser = null;
            window.currentChatId = null;
            window.socket = null;
            window.sqlite3Module = null;
            window.localDB = null;
            window.opfsRoot = null;
            window.typingTimeout = null;
            const LOCAL_DB_NAME = 'chat_messagesramz.db';

            // بيانات وهمية مبدئية للمستخدمين والمكالمات والقصص
            let chats = [
                { id: 'رمزي', name: 'رمزي', avatar: 'ر', online: true, lastMsg: '', lastTime: null, unread: 0 },
                { id: 'شعلان', name: 'شعلان', avatar: 'ش', online: true, lastMsg: '', lastTime: null, unread: 0 }
            ];
            let contacts = [
                { id: 'رمزي', name: 'رمزي', phone: '+966 5 1234 5678' },
                { id: 'شعلان', name: 'شعلان', phone: '+966 5 8765 4321' }
            ];
            let callLogs = [
                { id: 'c1', name: 'رمزي', avatar: 'ر', time: 'اليوم 10:30', type: 'outgoing', missed: false },
                { id: 'c2', name: 'شعلان', avatar: 'ش', time: 'أمس 18:45', type: 'incoming', missed: false }
            ];
            let stories = [
                { id: 's1', name: 'رمزي', avatar: 'ر', viewed: false },
                { id: 's2', name: 'شعلان', avatar: 'ش', viewed: false }
            ];

            // دوال OPFS و SQLite (نفس السابق)
            async function initOPFS() {
                if (!navigator.storage?.getDirectory) return false;
                window.opfsRoot = await navigator.storage.getDirectory();
                const mediaDir = await window.opfsRoot.getDirectoryHandle('media', { create: true });
                await mediaDir.getDirectoryHandle('RamzApp', { create: true });
                return true;
            }
            window.saveFileToOPFS = async function(fileBlob, fileId) {
                const mediaDir = await window.opfsRoot.getDirectoryHandle('media', { create: true });
                const ramzDir = await mediaDir.getDirectoryHandle('RamzApp', { create: true });
                const fileHandle = await ramzDir.getFileHandle(fileId, { create: true });
                const writable = await fileHandle.createWritable();
                await writable.write(fileBlob);
                await writable.close();
            };
            window.getFileFromOPFS = async function(fileId) {
                const mediaDir = await window.opfsRoot.getDirectoryHandle('media', { create: false });
                const ramzDir = await mediaDir.getDirectoryHandle('RamzApp', { create: false });
                const fileHandle = await ramzDir.getFileHandle(fileId);
                return await fileHandle.getFile();
            };
            async function initSQLiteWithRetry(retries=3) {
                for(let i=0;i<retries;i++){
                    try{
                        if(!window.sqlite3InitModule) await new Promise(r=>setTimeout(r,500));
                        else{
                            window.sqlite3Module = await window.sqlite3InitModule({print:console.log});
                            window.localDB = new window.sqlite3Module.oo1.OpfsDb('/'+LOCAL_DB_NAME);
                            window.localDB.exec(`CREATE TABLE IF NOT EXISTS messages (
                                id INTEGER PRIMARY KEY AUTOINCREMENT,
                                messageId TEXT UNIQUE,
                                sender TEXT NOT NULL, receiver TEXT NOT NULL,
                                type TEXT NOT NULL, content TEXT, fileId TEXT,
                                fileType TEXT, fileSize INTEGER, time INTEGER NOT NULL,
                                status TEXT DEFAULT 'sending'
                            );`);
                            return true;
                        }
                    }catch(e){ await new Promise(r=>setTimeout(r,1000)); }
                }
                toast('⚠️ قاعدة البيانات المحلية غير متوفرة، لن تحفظ الرسائل');
                return false;
            }
            window.saveTextMessageLocally = async (id, s, r, txt, t, status='sending') => { if(window.localDB) window.localDB.exec(`INSERT INTO messages (messageId,sender,receiver,type,content,time,status) VALUES (?,?,?,'text',?,?,?)`,[id,s,r,txt,t,status]); };
            window.saveFileMessageLocally = async (id,s,r,fn,fid,ftype,fsize,t,status='sending') => { if(window.localDB) window.localDB.exec(`INSERT INTO messages (messageId,sender,receiver,type,content,fileId,fileType,fileSize,time,status) VALUES (?,?,?,'file',?,?,?,?,?,?)`,[id,s,r,fn,fid,ftype,fsize,t,status]); };
            window.updateMessageStatus = async (mid,st) => { if(window.localDB){ window.localDB.exec(`UPDATE messages SET status=? WHERE messageId=?`,[st,mid]); renderMessages(); } };
            window.getAllMessagesForChat = async (chatId) => { if(!window.localDB) return []; return window.localDB.exec(`SELECT * FROM messages WHERE (sender=? AND receiver=?) OR (sender=? AND receiver=?) ORDER BY time ASC`,[window.currentUser,chatId,chatId,window.currentUser],{rowMode:'object'})||[]; };
            async function renderMessages(){
                if(!window.currentChatId || !window.localDB) return;
                const msgs = await window.getAllMessagesForChat(window.currentChatId);
                const area = document.getElementById('messagesArea');
                area.innerHTML = '';
                let lastDate='';
                for(const m of msgs){
                    const dStr = new Date(m.time).toDateString();
                    if(dStr !== lastDate) { area.innerHTML += `<div class="date-divider">${new Date(m.time).toLocaleDateString('ar-SA')}</div>`; lastDate=dStr; }
                    const isMe = m.sender === window.currentUser;
                    let statusHtml = isMe ? (m.status==='sending'?'⏳':m.status==='delivered'?'✔️':m.status==='read'?'✔️✔️':'❌'):'';
                    let contentHtml = '';
                    if(m.type==='text') contentHtml = `<div class="msg-text">${escapeHtml(m.content)}</div>`;
                    else{
                        try{
                            const file = await window.getFileFromOPFS(m.fileId);
                            const url = URL.createObjectURL(file);
                            if(m.fileType?.startsWith('image/')) contentHtml = `<img src="${url}" class="attachment-img" onclick="window.openImageViewer('${url}')">`;
                            else if(m.fileType?.startsWith('video/')) contentHtml = `<video controls src="${url}" style="max-width:200px; border-radius:10px;"></video>`;
                            else contentHtml = `<a href="${url}" download="${escapeHtml(m.content)}" class="file-link"><i class="fas fa-download"></i> ${escapeHtml(m.content)} (${formatFileSize(m.fileSize)})</a>`;
                            setTimeout(()=>URL.revokeObjectURL(url),60000);
                        }catch(e){ contentHtml = `<span style="color:red;">⚠️ ملف غير متوفر</span>`; }
                    }
                    area.innerHTML += `<div class="msg-row ${isMe?'own':'other'}"><div class="msg-bubble">${contentHtml}<div class="msg-time-row"><span>${new Date(m.time).toLocaleTimeString('ar-SA',{hour:'2-digit',minute:'2-digit'})}</span> ${statusHtml}</div></div></div>`;
                }
                area.scrollTop = area.scrollHeight;
            }
            window.renderMessages = renderMessages;
            function escapeHtml(s){ return s? s.replace(/[&<>]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]):''; }
            function formatFileSize(b){ if(b<1024) return b+' B'; if(b<1048576) return (b/1024).toFixed(1)+' KB'; return (b/1048576).toFixed(1)+' MB'; }
            window.sendTextMessage = async (receiver,text)=>{
                const mid = Date.now()+'_'+Math.random().toString(36).substr(2,8);
                const t = Date.now();
                await window.saveTextMessageLocally(mid, window.currentUser, receiver, text, t, 'sending');
                await renderMessages();
                window.socket.emit('send_message', { sender:window.currentUser, receiver, messageId:mid, content:text, time:t });
            };
            window.sendFileMessage = async (receiver,file)=>{
                const mid = Date.now()+'_'+Math.random().toString(36).substr(2,8);
                const fid = mid+'_'+file.name;
                const t = Date.now();
                await window.saveFileToOPFS(file, fid);
                await window.saveFileMessageLocally(mid, window.currentUser, receiver, file.name, fid, file.type, file.size, t, 'sending');
                await renderMessages();
                const reader = new FileReader();
                reader.onload = (e)=>{
                    window.socket.emit('send_file', { sender:window.currentUser, receiver, messageId:mid, fileName:file.name, fileId:fid, fileType:file.type, fileSize:file.size, time:t, data:e.target.result });
                };
                reader.readAsArrayBuffer(file);
            };
            function initSocket(){
                window.socket = io();
                window.socket.emit('user_online', window.currentUser);
                window.socket.on('receive_message', async (data)=>{
                    if(data.sender !== window.currentUser && data.receiver === window.currentUser){
                        await window.saveTextMessageLocally(data.messageId, data.sender, data.receiver, data.content, data.time, 'delivered');
                        await renderMessages();
                        window.socket.emit('read_receipt', { sender:data.sender, receiver:window.currentUser, messageId:data.messageId });
                        if(window.currentChatId === data.sender) playNotificationSound();
                        updateChatLastMsg(data.sender, data.content, data.time);
                    }
                });
                window.socket.on('receive_file', async (data)=>{
                    if(data.sender !== window.currentUser && data.receiver === window.currentUser){
                        const blob = new Blob([new Uint8Array(data.data)], {type: data.fileType});
                        await window.saveFileToOPFS(blob, data.fileId);
                        await window.saveFileMessageLocally(data.messageId, data.sender, data.receiver, data.fileName, data.fileId, data.fileType, data.fileSize, data.time, 'delivered');
                        await renderMessages();
                        window.socket.emit('read_receipt', { sender:data.sender, receiver:window.currentUser, messageId:data.messageId });
                        if(window.currentChatId === data.sender) playNotificationSound();
                        updateChatLastMsg(data.sender, '📎 مرفق', data.time);
                    }
                });
                window.socket.on('message_delivered', ({messageId})=>{ window.updateMessageStatus(messageId,'delivered'); });
                window.socket.on('message_read', ({messageId})=>{ window.updateMessageStatus(messageId,'read'); });
                window.socket.on('typing', ({sender,isTyping})=>{
                    if(sender !== window.currentUser && window.currentChatId === sender){
                        const statusDiv = document.getElementById('chatStatusDisp');
                        if(isTyping) { statusDiv.textContent = 'يكتب الآن...'; statusDiv.classList.add('typing'); }
                        else { statusDiv.textContent = 'متصل الآن'; statusDiv.classList.remove('typing'); }
                    }
                });
            }
            function playNotificationSound(){ try{ const ctx = new (window.AudioContext||window.webkitAudioContext)(); const osc = ctx.createOscillator(); const gain = ctx.createGain(); osc.connect(gain); gain.connect(ctx.destination); osc.frequency.value = 800; gain.gain.setValueAtTime(0.2,ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.2); osc.start(); osc.stop(ctx.currentTime+0.2); }catch(e){} }
            function updateChatLastMsg(chatId, msg, time){ const c = chats.find(c=>c.id===chatId); if(c){ c.lastMsg = msg; c.lastTime = time; renderChats(); } }
            window.onTypingStart = function(){ if(window.currentChatId && window.socket){ window.socket.emit('typing', { sender:window.currentUser, receiver:window.currentChatId, isTyping:true }); clearTimeout(window.typingTimeout); window.typingTimeout = setTimeout(()=>window.socket.emit('typing', { sender:window.currentUser, receiver:window.currentChatId, isTyping:false }),1500); } };

            // دوال واجهة المستخدم
            function toast(msg){ const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); clearTimeout(window._toast); window._toast = setTimeout(()=>t.classList.remove('show'),2000); }
            window.toast = toast;
            function showScreen(screenId){
                document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
                document.getElementById(screenId+'Screen').classList.add('active');
                document.querySelectorAll('.nav-item').forEach(nav=>nav.classList.toggle('active', nav.dataset.nav === screenId));
                if(screenId === 'chats') renderChats();
                if(screenId === 'updates') renderStories();
                if(screenId === 'calls') renderCalls();
                if(screenId === 'contacts') renderContacts();
            }
            function renderChats(){
                const container = document.getElementById('chatsList');
                container.innerHTML = '';
                chats.sort((a,b)=> (b.lastTime||0)-(a.lastTime||0));
                chats.forEach(c=>{
                    const div = document.createElement('div'); div.className = 'chat-item';
                    div.innerHTML = `<div class="chat-avatar">${c.avatar}<span class="online-dot"></span></div><div class="chat-info"><div class="chat-name">${escapeHtml(c.name)}</div><div class="chat-preview"><span class="last-msg">${c.lastMsg?escapeHtml(c.lastMsg.substring(0,40)):'اضغط للدردشة'}</span></div></div>`;
                    div.addEventListener('click',()=>openChat(c.id));
                    container.appendChild(div);
                });
            }
            async function openChat(chatId){
                window.currentChatId = chatId;
                const chat = chats.find(c=>c.id===chatId);
                document.getElementById('chatNameDisp').textContent = chat.name;
                document.getElementById('chatAvatar').textContent = chat.avatar;
                document.getElementById('chatStatusDisp').textContent = chat.online ? 'متصل الآن' : 'غير متصل';
                await renderMessages();
                showScreen('chat');
            }
            function renderStories(){
                const bar = document.getElementById('storyBar');
                bar.innerHTML = `<div class="story-item" id="addStoryBtn2"><div class="story-ring"><div class="story-avatar" style="background:var(--accent);">+</div></div><div class="story-name">قصتي</div></div>`;
                stories.forEach(s=>{
                    const div = document.createElement('div'); div.className = 'story-item';
                    div.innerHTML = `<div class="story-ring"><div class="story-avatar">${s.avatar}</div></div><div class="story-name">${escapeHtml(s.name)}</div>`;
                    div.addEventListener('click',()=>toast(`📖 قصة ${s.name}`));
                    bar.appendChild(div);
                });
                document.getElementById('addStoryBtn2')?.addEventListener('click',()=>toast('📸 إضافة قصة (كاميرا قريباً)'));
            }
            function renderCalls(){
                const container = document.getElementById('callsList');
                container.innerHTML = callLogs.length? callLogs.map(c=>`<div class="call-item" onclick="toast('📞 الاتصال بـ ${c.name}')"><div class="chat-avatar">${c.avatar}</div><div class="call-info"><div class="call-name">${escapeHtml(c.name)}</div><div class="call-time"><span>${c.type==='outgoing'?'📤 صادر':c.type==='incoming'?'📥 وارد':'🔁 فائت'} • ${c.time}</span></div></div></div>`).join('') : '<div class="empty-state">لا توجد مكالمات</div>';
            }
            function renderContacts(){
                const container = document.getElementById('contactsList');
                container.innerHTML = contacts.map(c=>`<div class="contact-item" data-id="${c.id}"><div class="chat-avatar">${c.name.charAt(0)}</div><div class="contact-info"><div class="contact-name">${escapeHtml(c.name)}</div><div class="contact-number"><span>${c.phone}</span></div></div></div>`).join('');
                document.querySelectorAll('.contact-item').forEach(el=>el.addEventListener('click',()=>{
                    const id = el.dataset.id;
                    const chat = chats.find(ch=>ch.id===id);
                    if(chat) openChat(chat.id);
                    else toast('ابدأ محادثة جديدة مع '+el.querySelector('.contact-name')?.innerText);
                }));
            }
            window.openImageViewer = function(url){ document.getElementById('viewerImage').src = url; document.getElementById('imageViewer').classList.add('active'); };
            function closeImageViewer(){ document.getElementById('imageViewer').classList.remove('active'); }
            function toggleTheme(){ document.body.classList.toggle('light-theme'); localStorage.setItem('ramz_theme', document.body.classList.contains('light-theme')?'light':'dark'); }
            async function onLoginSuccess(username){
                window.currentUser = username;
                localStorage.setItem('ramz_current_user', username);
                await initOPFS();
                await initSQLiteWithRetry();
                initSocket();
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('appContainer').style.display = 'flex';
                renderChats(); renderStories(); renderCalls(); renderContacts();
                showScreen('chats');
                toast(`مرحباً ${username}`);
            }
            function logout(){ if(window.socket) window.socket.disconnect(); localStorage.removeItem('ramz_current_user'); location.reload(); }

            // ربط الأحداث
            document.getElementById('loginBtn').onclick = async ()=>{
                const username = document.getElementById('loginNameInput').value.trim();
                const password = document.getElementById('loginPasswordInput').value;
                if(!username||!password) return toast('أدخل اسم المستخدم وكلمة المرور');
                const btn = document.getElementById('loginBtn'); btn.disabled=true;
                document.getElementById('loginLoader').style.display='block';
                try{
                    const res = await fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username,password}) });
                    const data = await res.json();
                    if(!res.ok) throw new Error(data.error);
                    await onLoginSuccess(username);
                }catch(err){ toast(err.message); btn.disabled=false; document.getElementById('loginLoader').style.display='none'; }
            };
            document.getElementById('guestBtn').onclick = ()=>toast('استخدم حساب رمزي أو شعلان (كلمة المرور 654321)');
            document.getElementById('sendMsgBtn').onclick = ()=>{
                const inp = document.getElementById('msgInput');
                if(inp.value.trim() && window.currentChatId){
                    window.sendTextMessage(window.currentChatId, inp.value);
                    inp.value = '';
                    document.getElementById('sendMsgBtn').style.display='none';
                    document.getElementById('micBtn').style.display='flex';
                }
            };
            document.getElementById('msgInput').addEventListener('input', (e)=>{
                const has = e.target.value.trim().length>0;
                document.getElementById('sendMsgBtn').style.display = has?'flex':'none';
                document.getElementById('micBtn').style.display = has?'none':'flex';
                if(has) window.onTypingStart();
            });
            document.getElementById('msgInput').addEventListener('keypress', e=>{ if(e.key==='Enter') document.getElementById('sendMsgBtn').click(); });
            document.getElementById('backBtn').onclick = ()=>showScreen('chats');
            document.getElementById('attachBtn').onclick = ()=>{
                const input = document.createElement('input'); input.type='file'; input.accept='image/*,video/*,application/pdf,.txt,.docx';
                input.onchange = async (e)=>{ if(e.target.files[0] && window.currentChatId) await window.sendFileMessage(window.currentChatId, e.target.files[0]); };
                input.click();
            };
            document.getElementById('micBtn').onclick = ()=>toast('تسجيل الصوت قريباً');
            document.getElementById('closeImageViewer').onclick = closeImageViewer;
            document.getElementById('imageViewer').addEventListener('click', closeImageViewer);
            document.getElementById('themeToggleBtn').onclick = toggleTheme;
            document.getElementById('logoutBtn').onclick = logout;
            document.getElementById('addStoryBtn').onclick = ()=>toast('📸 إضافة قصة (كاميرا قريباً)');
            document.getElementById('newChatBtn').onclick = ()=>toast('إنشاء محادثة جديدة قريباً');
            document.getElementById('globalSearchBtn').onclick = ()=>toast('بحث عام قريباً');
            document.getElementById('newCallBtn').onclick = ()=>toast('مكالمة جديدة قريباً');
            document.getElementById('addContactBtn').onclick = ()=>toast('إضافة جهة اتصال قريباً');
            document.getElementById('searchChatsInput').addEventListener('input', (e)=>{
                const q = e.target.value.toLowerCase();
                document.querySelectorAll('.chat-item').forEach(item=>{
                    const name = item.querySelector('.chat-name')?.innerText.toLowerCase();
                    item.style.display = name?.includes(q) ? 'flex' : 'none';
                });
            });
            document.getElementById('searchContactsInput')?.addEventListener('input', (e)=>{
                const q = e.target.value.toLowerCase();
                document.querySelectorAll('.contact-item').forEach(item=>{
                    const name = item.querySelector('.contact-name')?.innerText.toLowerCase();
                    item.style.display = name?.includes(q) ? 'flex' : 'none';
                });
            });
            // إيموجي
            const emojiBtn = document.getElementById('emojiBtn');
            const emojiPicker = document.getElementById('emojiPicker');
            if(emojiBtn && emojiPicker){
                emojiBtn.onclick = ()=>{ emojiPicker.style.display = emojiPicker.style.display==='flex'?'none':'flex'; };
                const emojis = ['😀','😂','😍','😢','😡','👍','❤️','🔥','🎉','😎','🤔','😴','🥳','😇','🤗','😤','😱','💔','✨','🌟','💡','📎','📷','🎵','📍','🙏','💪','👀','🤝','🚀','💯','✅','❌','🎯'];
                emojiPicker.innerHTML = '';
                emojis.forEach(e=>{ const s=document.createElement('span'); s.textContent=e; s.style.fontSize='26px'; s.style.cursor='pointer'; s.style.padding='5px'; s.onclick=()=>{ document.getElementById('msgInput').value+=e; emojiPicker.style.display='none'; document.getElementById('msgInput').focus(); }; emojiPicker.appendChild(s); });
            }
            document.addEventListener('click', (e)=>{ if(emojiPicker && !emojiPicker.contains(e.target) && e.target !== emojiBtn) emojiPicker.style.display='none'; });

            // الشريط السفلي
            document.querySelectorAll('.nav-item').forEach(nav=>{
                nav.addEventListener('click', ()=>{
                    const screen = nav.dataset.nav;
                    if(screen === 'chats') showScreen('chats');
                    else if(screen === 'updates') showScreen('updates');
                    else if(screen === 'calls') showScreen('calls');
                    else if(screen === 'contacts') showScreen('contacts');
                    else if(screen === 'settings') showScreen('settings');
                });
            });
            const savedTheme = localStorage.getItem('ramz_theme');
            if(savedTheme === 'light') document.body.classList.add('light-theme');
            (async ()=>{
                const saved = localStorage.getItem('ramz_current_user');
                if(saved){
                    try{ await onLoginSuccess(saved); }catch(e){ console.error(e); toast('خطأ في استعادة الجلسة'); }
                }else{
                    document.getElementById('loginScreen').classList.remove('hidden');
                    document.getElementById('appContainer').style.display = 'none';
                }
            })();
        })();
    </script>
</body>
</html>
